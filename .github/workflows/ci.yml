name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build API
        run: npm run build:api

      - name: Build web
        run: npm run build:web

      - name: Test API
        run: npm run test:api

      - name: Test web
        run: npm run test:web
