services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agentic_accounting_test
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agentic_accounting_test"]
      interval: 2s
      timeout: 5s
      retries: 20
    tmpfs:
      - /var/lib/postgresql/data
