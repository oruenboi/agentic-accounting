services:
  api:
    build:
      context: ../../../apps/api
    restart: unless-stopped
    env_file:
      - ./api.env
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/v1/health').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))\""
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_DOMAIN: ${API_DOMAIN}
      TLS_EMAIL: ${TLS_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
